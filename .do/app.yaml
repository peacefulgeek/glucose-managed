name: glucose-managed
region: nyc
domains:
  - domain: glucosemanaged.com
    type: PRIMARY
  - domain: www.glucosemanaged.com
    type: ALIAS
services:
  - name: web
    source_dir: /
    github:
      repo: peacefulgeek/glucose-managed
      branch: main
      deploy_on_push: true
    build_command: pnpm install && pnpm build
    run_command: node scripts/start-with-cron.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 3000
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: OPENAI_API_KEY
        type: SECRET
        value: REPLACE_WITH_YOUR_DEEPSEEK_KEY
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: AMAZON_ASSOCIATE_TAG
        value: spankyspinola-20
      - key: BUNNY_STORAGE_ZONE
        value: glucose-managed
      - key: BUNNY_API_KEY
        type: SECRET
        value: REPLACE_WITH_YOUR_BUNNY_KEY
      - key: BUNNY_CDN_URL
        value: https://glucose-managed.b-cdn.net
      - key: BUNNY_STORAGE_ENDPOINT
        value: https://ny.storage.bunnycdn.com
      - key: SITE_URL
        value: https://glucosemanaged.com
